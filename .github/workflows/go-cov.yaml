name: Go test coverage report

on:
  workflow_call:
    secrets:
      token:
        required: true

permissions: {}

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      # Needed to comment on the pull request
      pull-requests: write
      # Needed to create a comment on the commit
      contents: write
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # default fetch-depth is insufficent to find previous coverage notes
          fetch-depth: 10

      - uses: actions/setup-go@main  # zizmor: ignore[unpinned-uses] test override.
        with:
          go-version: '=1.26.0'

      - name: Create coverage report
        uses: gwatts/go-coverage-action@2845595538a59d63d1bf55f109c14e104c6f7cb3 # v2.0.0
        id: coverage
        env:
          GITHUB_TOKEN: "${{ secrets.token }}"
        with:
          # Optional coverage threshold
          # use fail-coverage to determine what should happen below this threshold
          #coverage-threshold: 80
          fail-coverage: 1

          # collect coverage for all packages beyond the one under test
          cover-pkg: ./...
